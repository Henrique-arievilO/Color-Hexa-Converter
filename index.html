<!doctype html>
<html lang="pt-BR">
  <head>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Hex Converter</title>
  </head>
  <body>
    <header>
      <h1>Color Hex Converter</h1>
    </header>
    <main>
      <form action="./" class="container">
        <p>Insira um valor numérico entre 0 e 255.</p>
        <div class="content">
          <label for="red">red</label>
          <input
            type="number"
            id="red"
            name="red"
            min="0"
            max="255"
            step="1"
            required
          />
        </div>
        <div class="content">
          <label for="green">green</label>
          <input
            type="number"
            id="green"
            name="green"
            min="0"
            max="255"
            step="1"
            required
          />
        </div>
        <div class="content">
          <label for="blue">blue</label>
          <input
            type="number"
            id="blue"
            name="blue"
            min="0"
            max="255"
            step="1"
            required
          />
        </div>
        <p class="feedback"><span class="hexa-code"></span></p>
        <button class="button">Converter cor</button>
      </form>
      <span class="color-box"></span>
    </main>
    <footer>
      <p>&copy;Color Hex Converter 2026 - All Rights Reserved</p>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
